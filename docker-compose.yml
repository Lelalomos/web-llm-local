version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: local-ollama-service
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-false}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_GPU_OVERHEAD=${OLLAMA_GPU_OVERHEAD:-0}
    volumes:
      - ${OLLAMA_MODELS_DIR:-./models}:/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-llm-gateway
    environment:
      - OLLAMA_URL=http://ollama:11434
      - SEARXNG_URL=http://searxng:8080
      - MEILI_URL=http://meilisearch:7700
      - DEFAULT_OLLAMA_MODEL=${DEFAULT_OLLAMA_MODEL:-gemma2:2b}
      - CHAT_MEMORY_PROMPT_CHARS=${CHAT_MEMORY_PROMPT_CHARS:-12000}
      - CHAT_MEMORY_SUMMARY_RAG_ENABLED=${CHAT_MEMORY_SUMMARY_RAG_ENABLED:-true}
      - CHAT_MEMORY_SUMMARY_RAG_CHARS=${CHAT_MEMORY_SUMMARY_RAG_CHARS:-6000}
      - OLLAMA_FORCE_NUM_GPU=${OLLAMA_FORCE_NUM_GPU:-999}
      - OLLAMA_DEFAULT_NUM_CTX=${OLLAMA_DEFAULT_NUM_CTX:-2048}
      - OLLAMA_DEFAULT_NUM_BATCH=${OLLAMA_DEFAULT_NUM_BATCH:-128}
      - OLLAMA_GEMMA2_2B_NUM_GPU=${OLLAMA_GEMMA2_2B_NUM_GPU:-999}
      - OLLAMA_GEMMA2_2B_NUM_CTX=${OLLAMA_GEMMA2_2B_NUM_CTX:-2048}
      - OLLAMA_GEMMA2_2B_NUM_BATCH=${OLLAMA_GEMMA2_2B_NUM_BATCH:-256}
      - OLLAMA_GEMMA4_E2B_NUM_GPU=${OLLAMA_GEMMA4_E2B_NUM_GPU:-999}
      - OLLAMA_GEMMA4_E2B_NUM_CTX=${OLLAMA_GEMMA4_E2B_NUM_CTX:-2048}
      - OLLAMA_GEMMA4_E2B_NUM_BATCH=${OLLAMA_GEMMA4_E2B_NUM_BATCH:-128}
      - OLLAMA_GEMMA_LARGE_NUM_CTX=${OLLAMA_GEMMA_LARGE_NUM_CTX:-1024}
      - OLLAMA_GEMMA_LARGE_NUM_BATCH=${OLLAMA_GEMMA_LARGE_NUM_BATCH:-32}
      - OLLAMA_GEMMA_LARGE_NUM_GPU=${OLLAMA_GEMMA_LARGE_NUM_GPU:-}
      - PDF_EXTRACTION_MODE=${PDF_EXTRACTION_MODE:-surya_docling}
      - PDF_SURYA_TIMEOUT_SECONDS=${PDF_SURYA_TIMEOUT_SECONDS:-60}
      - PDF_FAST_TEXT_MIN_CHARS=${PDF_FAST_TEXT_MIN_CHARS:-1000}
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./skill:/skill
      - ./test:/test:ro
    depends_on:
      - ollama
      - searxng
      - meilisearch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: local-searxng-service
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    volumes:
      - ./searxng:/etc/searxng:ro
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: local-meilisearch-service
    environment:
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data:/meili_data
    restart: unless-stopped

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-llm-web-ui
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped
